esphome:
  name: esphome-web-c3f4ed

external_components:
  - source:
      type: git
      url: https://github.com/mpetereit/tcl_ac_esphome
      ref: master
    refresh: 0s
    components: [tcl_climate]

esp8266:
  board: esp07

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:

ota:
  platform: esphome

logger:
  level: INFO
  baud_rate: 0

uart:
  id: ac_bus
  tx_pin: GPIO15
  rx_pin: GPIO13
  baud_rate: 9600
  parity: EVEN
  rx_buffer_size: 256

select:
  - platform: template
    name: "Vertikale Lamelle"
    id: vswing_select
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "Last position"
      - "Fix top"
      - "Fix upper"
      - "Fix mid"
      - "Fix lower"
      - "Fix bottom"
      - "Move full"
      - "Move upper"
      - "Move lower"
    initial_option: "Fix mid"

  - platform: template
    name: "Horizontale Lamelle"
    id: hswing_select
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "Last position"
      - "Fix left"
      - "Fix mid left"
      - "Fix mid"
      - "Fix mid right"
      - "Fix right"
      - "Move full"
      - "Move left"
      - "Move mid"
      - "Move right"
    initial_option: "Fix mid"

climate:
  - platform: tcl_climate
    id: my_custom_climate
    name: "Klimasteuerung"
    uart_id: ac_bus
    vswing_select: vswing_select
    hswing_select: hswing_select
