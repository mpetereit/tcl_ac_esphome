esphome:
  name: esphome-web-c3f4ed

external_components:
  - source:
      type: git
      url: https://github.com/mpetereit/tcl_ac_esphome
      ref: master
    refresh: 0s
    components: [tcl_climate]

esp8266:
  board: esp07

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:

ota:
  platform: esphome

logger:
  level: INFO
  baud_rate: 0

uart:
  id: ac_bus
  tx_pin: GPIO15
  rx_pin: GPIO13
  baud_rate: 9600
  parity: EVEN
  rx_buffer_size: 256

# ── Schalter ─────────────────────────────────────────────────────────────────

switch:
  - platform: template
    name: "Piep-Ton"
    id: beep_switch
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Display"
    id: display_switch
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Eco-Modus"
    id: eco_switch
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "8°-Heizung"
    id: deg8_switch
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

# ── Selects ───────────────────────────────────────────────────────────────────

select:
  - platform: template
    name: "Vertikale Lamelle"
    id: vswing_select
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "Fix mid"
    options:
      - "Last position"
      - "Fix top"
      - "Fix upper"
      - "Fix mid"
      - "Fix lower"
      - "Fix bottom"
      - "Move full"
      - "Move upper"
      - "Move lower"

  - platform: template
    name: "Horizontale Lamelle"
    id: hswing_select
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "Fix mid"
    options:
      - "Last position"
      - "Fix left"
      - "Fix mid left"
      - "Fix mid"
      - "Fix mid right"
      - "Fix right"
      - "Move full"
      - "Move left"
      - "Move mid"
      - "Move right"

  - platform: template
    name: "Schlafmodus"
    id: sleep_select
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "Off"
    options:
      - "Off"
      - "Default"
      - "Elderly"
      - "Young"

  - platform: template
    name: "Preset"
    id: preset_select
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: "Normal"
    options:
      - "Normal"
      - "Turbo"
      - "Mute"

# ── Klimaanlage ───────────────────────────────────────────────────────────────

climate:
  - platform: tcl_climate
    id: my_custom_climate
    name: "Klimasteuerung"
    uart_id: ac_bus
    # Lamellen
    vswing_select: vswing_select
    hswing_select: hswing_select
    # Schlaf & Preset
    sleep_select: sleep_select
    preset_select: preset_select
    # Schalter
    beep_switch: beep_switch
    display_switch: display_switch
    eco_switch: eco_switch
    8deg_switch: deg8_switch
